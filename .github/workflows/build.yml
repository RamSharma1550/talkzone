name: Build TalkZone APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Remove existing android folder
        run: rm -rf android

      - name: Setup Android
        run: |
          flutter create --project-name talkzone --org com.talkzone --platforms android temp_project
          mv temp_project/android ./android
          rm -rf temp_project

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: |
          chmod +x android/gradlew
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TalkZone-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
