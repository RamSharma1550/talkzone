name: Build TalkZone APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --project-name talkzone --org com.talkzone --platforms android .
          cp -f pubspec.yaml pubspec.yaml.bak

      - name: Restore pubspec
        run: cp -f pubspec.yaml.bak pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          cd ..
          flutter build apk --debug --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TalkZone-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
