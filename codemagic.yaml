workflows:
  android-workflow:
    name: TalkZone Android Build
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get packages
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - rams93735@gmail.com
        notify:
          success: true
          failure: true