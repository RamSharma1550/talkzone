workflows:
  android-workflow:
    name: TalkZone Android Build
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Set up Flutter project
        script: |
          flutter create --project-name talkzone --org com.talkzone .
          cp -r lib/* lib/
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - rams93735@gmail.com
        notify:
          success: true
          failure: true
